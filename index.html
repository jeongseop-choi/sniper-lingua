<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guéna Special - Sniper Lingua</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4e54c8;
            --secondary-color: #8f94fb;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
            --loop-active: #9b59b6;
        }
        * { box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }
        
        header {
            position: relative;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; padding: 25px 20px; text-align: center;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 24px; font-weight: bold; letter-spacing: 1px; }
        header p { font-size: 13px; opacity: 0.95; margin-top: 8px; font-style: italic; }

        #lang-toggle-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.5);
            color: white; padding: 5px 10px; border-radius: 15px;
            font-size: 12px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(5px); z-index: 10;
        }

        #category-levels {
            margin: 15px; padding: 10px; background: var(--card-bg);
            border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .category-row {
            display: flex; overflow-x: auto; gap: 8px;
            padding-bottom: 10px; margin-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
        .category-row::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            background-color: #f0f0f0; border: none; color: #555;
            padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold;
            white-space: nowrap; cursor: pointer; transition: all 0.2s;
        }
        .cat-btn.active { background-color: var(--primary-color); color: white; }

        .list-container { padding: 0 15px; }
        .sentence-card {
            background: var(--card-bg); padding: 18px; margin-bottom: 12px;
            border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .fr-text { font-size: 17px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; }
        .ko-text { font-size: 15px; color: #666; }
        
        /* 리스트 배지 스타일 */
        .badge-container { display: flex; flex-direction: column; gap: 4px; min-width: 65px; text-align: right; }
        .badge { font-size: 10px; padding: 3px 5px; border-radius: 4px; font-weight: bold; color: white; display: inline-block; width: 60px; text-align: center; }
        .badge-native { background-color: #2ecc71; } /* 원어민: 초록색 */
        .badge-ai { background-color: #f1c40f; color: #333; } /* AI: 노란색 */

        /* 모달 스타일 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 420px;
            border-radius: 25px; padding: 30px 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; height: 65px; }
        
        .play-btn {
            flex: 4; display: flex; align-items: center; justify-content: center;
            padding: 0 15px; border: none; border-radius: 15px;
            cursor: pointer; color: white; transition: transform 0.1s;
        }
        .btn-fr { background-color: #3498db; }
        .btn-ko { background-color: #e67e22; }
        
        .btn-lang { font-size: 14px; font-weight: bold; opacity: 0.9; margin-right: auto; }
        .btn-listen { font-size: 20px; font-weight: 800; flex-grow: 1; text-align: center; }
        .btn-source { font-size: 14px; font-weight: bold; opacity: 0.9; margin-left: auto; }

        .loop-btn {
            flex: 1; border: 2px solid #eee; background: white;
            border-radius: 15px; font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; transition: all 0.2s;
        }
        .loop-btn.active {
            border-color: var(--loop-active);
            color: var(--loop-active);
            background-color: #f9f0ff;
        }

        .btn-close { 
            background-color: #95a5a6; width: 100%; padding: 15px; 
            border: none; border-radius: 15px; color: white; 
            font-size: 18px; font-weight: bold; margin-top: 10px; 
        }
        
        #loader { text-align: center; padding: 30px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

    <header>
        <button id="lang-toggle-btn" onclick="toggleLanguage()">🇰🇷 한국어</button>
        <h1>Guéna Special</h1>
        <p id="app-subtitle"></p>
    </header>

    <div id="category-levels"></div>
    <div id="loader">Chargement...</div>
    <div class="list-container" id="sentence-list"></div>

    <div class="modal-overlay" id="audio-modal">
        <div class="modal-content">
            <div id="modal-text-fr" style="font-size: 24px; font-weight: bold; color: #4e54c8; margin-bottom: 5px;"></div>
            <div id="modal-text-ko" style="font-size: 18px; color: #777; margin-bottom: 30px;"></div>
            
            <div class="btn-row">
                <button class="play-btn btn-fr" onclick="playAudio('fr')">
                    <span class="btn-lang">FR</span>
                    <span class="btn-listen" id="lt-fr">듣기</span>
                    <span class="btn-source" id="ls-fr">Original</span>
                </button>
                <button class="loop-btn" id="loop-fr" onclick="toggleLoop('fr')">🔁</button>
            </div>

            <div class="btn-row">
                <button class="play-btn btn-ko" onclick="playAudio('ko')">
                    <span class="btn-lang">KR</span>
                    <span class="btn-listen" id="lt-ko">듣기</span>
                    <span class="btn-source" id="ls-ko">Original</span>
                </button>
                <button class="loop-btn" id="loop-ko" onclick="toggleLoop('ko')">🔁</button>
            </div>

            <button class="btn-close" onclick="closeModal()">✕ Fermer</button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://study-ea9a0-default-rtdb.europe-west1.firebasedatabase.app/.json";
        const STORAGE_BUCKET = "study-ea9a0.firebasestorage.app";

        let globalData = [];
        let catTree = {};
        let currentPath = []; 
        let currentLang = 'fr';
        let currentItem = null;
        let isLooping = { fr: false, ko: false };
        let translatedCache = {};

        const langData = {
            fr: { subtitle: "La salle d'étude de Guéna et Jeongseop", toggleBtn: "🇰🇷 한국어", listen: "Écouter", native: "Original", ai: "AI", badge_n: "FR Human", badge_a: "FR AI" },
            ko: { subtitle: "게나엘과 정섭이 함께하는 공부방", toggleBtn: "🇫🇷 Français", listen: "듣기", native: "오리지날", ai: "AI", badge_n: "원어민", badge_a: "AI" }
        };

        window.onload = async () => {
            updateLanguageUI();
            try {
                const response = await fetch(FIREBASE_URL);
                const dbData = await response.json();
                if (dbData) {
                    globalData = dbData.data || [];
                    buildCategoryTree(dbData.categories || []);
                    renderCategoryLevels();
                }
            } catch (error) { console.error(error); }
        };

        async function translateText(text, target) {
            if (!text || text.match(/^[a-zA-Z0-9\s?.,!]+$/)) return text;
            const cacheKey = `${text}_${target}`;
            if (translatedCache[cacheKey]) return translatedCache[cacheKey];
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                return translatedCache[cacheKey] = data[0][0][0];
            } catch (e) { return text; }
        }

        async function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'ko' : 'fr';
            updateLanguageUI();
            await renderCategoryLevels(); 
            if (currentPath.length > 0) renderSentences(currentPath.join('/'));
        }

        function updateLanguageUI() {
            document.getElementById("app-subtitle").innerText = langData[currentLang].subtitle;
            document.getElementById("lang-toggle-btn").innerText = langData[currentLang].toggleBtn;
        }

        function buildCategoryTree(categories) {
            catTree = {};
            categories.forEach(path => {
                let parts = path.split('/');
                let curr = catTree;
                parts.forEach(part => {
                    if (!curr[part]) curr[part] = { _children: {} };
                    curr = curr[part]._children;
                });
            });
            document.getElementById("loader").style.display = "none";
        }

        async function renderCategoryLevels() {
            const container = document.getElementById("category-levels");
            container.innerHTML = "";
            let curr = catTree;
            await renderRow(curr, 0);
            for (let part of currentPath) {
                if (curr[part]) {
                    curr = curr[part]._children;
                    if (Object.keys(curr).length > 0) await renderRow(curr, currentPath.indexOf(part) + 1);
                }
            }
        }

        async function renderRow(nodes, depth) {
            const row = document.createElement("div");
            row.className = "category-row";
            const promises = Object.keys(nodes).map(async (name) => {
                const btn = document.createElement("button");
                btn.className = "cat-btn " + (currentPath[depth] === name ? "active" : "");
                btn.innerText = (currentLang === 'fr') ? await translateText(name, 'fr') : name;
                btn.onclick = () => {
                    currentPath = currentPath.slice(0, depth);
                    currentPath.push(name);
                    renderCategoryLevels();
                    renderSentences(currentPath.join('/'));
                };
                return btn;
            });
            const buttons = await Promise.all(promises);
            buttons.forEach(b => row.appendChild(b));
            document.getElementById("category-levels").appendChild(row);
        }

        function renderSentences(path) {
            const list = document.getElementById("sentence-list");
            list.innerHTML = "";
            globalData.filter(item => item.cat === path).forEach(item => {
                const isKo = /[가-힣]/.test(item.text);
                const koT = isKo ? item.text : item.trans;
                const frT = isKo ? item.trans : item.text;
                
                const frNative = isKo ? item.out_file : item.in_file;
                const koNative = isKo ? item.in_file : item.out_file;

                const card = document.createElement("div");
                card.className = "sentence-card";
                card.innerHTML = `
                    <div style="flex:1"><div class="fr-text">${frT}</div><div class="ko-text">${koT}</div></div>
                    <div class="badge-container">
                        <span class="badge ${frNative ? 'badge-native' : 'badge-ai'}">FR ${frNative ? langData[currentLang].native : 'AI'}</span>
                        <span class="badge ${koNative ? 'badge-native' : 'badge-ai'}">KR ${koNative ? langData[currentLang].native : 'AI'}</span>
                    </div>`;
                card.onclick = () => openModal(item, frT, koT);
                list.appendChild(card);
            });
        }

        function openModal(item, fr, ko) {
            const isKo = /[가-힣]/.test(item.text);
            currentItem = { frText: fr, koText: ko, frFile: isKo ? item.out_file : item.in_file, koFile: isKo ? item.in_file : item.out_file };
            document.getElementById("modal-text-fr").innerText = fr;
            document.getElementById("modal-text-ko").innerText = ko;
            
            document.getElementById("lt-fr").innerText = langData[currentLang].listen;
            document.getElementById("lt-ko").innerText = langData[currentLang].listen;
            document.getElementById("ls-fr").innerText = currentItem.frFile ? langData[currentLang].native : langData[currentLang].ai;
            document.getElementById("ls-ko").innerText = currentItem.koFile ? langData[currentLang].native : langData[currentLang].ai;
            
            isLooping = { fr: false, ko: false };
            document.querySelectorAll('.loop-btn').forEach(b => b.classList.remove('active'));
            document.getElementById("audio-modal").style.display = "flex";
        }

        function toggleLoop(lang) {
            isLooping[lang] = !isLooping[lang];
            document.getElementById(`loop-${lang}`).classList.toggle("active", isLooping[lang]);
            if (window.currentAudio) window.currentAudio.loop = isLooping[lang];
            if (isLooping[lang]) playAudio(lang);
        }

        function playAudio(lang) {
            if (window.currentAudio) window.currentAudio.pause();
            window.speechSynthesis.cancel();
            const text = lang === 'fr' ? currentItem.frText : currentItem.koText;
            const file = lang === 'fr' ? currentItem.frFile : currentItem.koFile;
            if (file) {
                const url = `https://firebasestorage.googleapis.com/v0/b/${STORAGE_BUCKET}/o/${encodeURIComponent(file)}?alt=media`;
                window.currentAudio = new Audio(url);
                window.currentAudio.loop = isLooping[lang];
                window.currentAudio.play().catch(() => playTTS(text, lang));
            } else { playTTS(text, lang); }
        }

        function playTTS(text, lang) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = lang === 'fr' ? 'fr-FR' : 'ko-KR';
            ut.rate = 0.9;
            ut.onend = () => { if (isLooping[lang]) playTTS(text, lang); };
            window.speechSynthesis.speak(ut);
        }

        function closeModal() {
            document.getElementById("audio-modal").style.display = "none";
            if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio.loop = false; }
            window.speechSynthesis.cancel();
            isLooping = { fr: false, ko: false };
        }
    </script>
</body>
</html>
