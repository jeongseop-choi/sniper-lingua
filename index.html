<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guéna Special - Sniper Lingua</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4e54c8;
            --secondary-color: #8f94fb;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }
        
        header {
            position: relative;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; padding: 25px 20px; text-align: center;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 24px; font-weight: bold; letter-spacing: 1px; }
        header p { font-size: 13px; opacity: 0.95; margin-top: 8px; font-style: italic; }

        #lang-toggle-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.5);
            color: white; padding: 5px 10px; border-radius: 15px;
            font-size: 12px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(5px); z-index: 10;
        }

        #category-levels {
            margin: 15px; padding: 10px; background: var(--card-bg);
            border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .category-row {
            display: flex; overflow-x: auto; gap: 8px;
            padding-bottom: 10px; margin-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
        .category-row::-webkit-scrollbar { display: none; }
        .category-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .cat-btn {
            background-color: #f0f0f0; border: none; color: #555;
            padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold;
            white-space: nowrap; cursor: pointer; transition: all 0.2s;
        }
        .cat-btn.active {
            background-color: var(--primary-color); color: white;
            box-shadow: 0 2px 5px rgba(78, 84, 200, 0.4);
        }

        .list-container { padding: 0 15px; }
        .sentence-card {
            background: var(--card-bg); padding: 15px; margin-bottom: 12px;
            border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: transform 0.1s;
        }
        .sentence-card:active { transform: scale(0.98); }
        .text-area { flex-grow: 1; padding-right: 10px; }
        .fr-text { font-size: 16px; font-weight: bold; color: var(--primary-color); margin-bottom: 4px; }
        .ko-text { font-size: 14px; color: #666; }
        
        .badge-container { display: flex; flex-direction: column; gap: 5px; min-width: 60px; text-align: right; }
        .badge { font-size: 10px; padding: 4px 6px; border-radius: 4px; font-weight: bold; text-align: center; }
        .badge-native { background-color: #2ecc71; color: white; }
        .badge-ai { background-color: #f1c40f; color: #333; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 85%; max-width: 400px;
            border-radius: 20px; padding: 25px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-fr { font-size: 22px; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; }
        .modal-ko { font-size: 18px; color: #555; margin-bottom: 25px; }
        
        .play-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; margin-bottom: 10px; border: none;
            border-radius: 12px; font-size: 16px; font-weight: bold;
            cursor: pointer; color: white;
        }
        .btn-fr { background-color: #3498db; }
        .btn-ko { background-color: #e74c3c; }
        .btn-close { background-color: #95a5a6; margin-top: 15px; }
        
        #loader { text-align: center; padding: 30px; font-weight: bold; color: #888; }
        .empty-msg { text-align: center; padding: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <button id="lang-toggle-btn" onclick="toggleLanguage()">🇰🇷 한국어</button>
        <h1>Guéna Special</h1>
        <p id="app-subtitle"></p>
    </header>

    <div id="category-levels"></div>
    <div id="loader">Chargement...</div>
    <div class="list-container" id="sentence-list"></div>

    <div class="modal-overlay" id="audio-modal">
        <div class="modal-content">
            <div class="modal-fr" id="modal-text-fr"></div>
            <div class="modal-ko" id="modal-text-ko"></div>
            <button class="play-btn btn-fr" onclick="playAudio('fr')">🇫🇷 <span id="btn-text-fr"></span></button>
            <button class="play-btn btn-ko" onclick="playAudio('ko')">🇰🇷 <span id="btn-text-ko"></span></button>
            <button class="play-btn btn-close" onclick="closeModal()" id="btn-text-close"></button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://study-ea9a0-default-rtdb.europe-west1.firebasedatabase.app/.json";
        const STORAGE_BUCKET = "study-ea9a0.firebasestorage.app";

        let globalData = [];
        let catTree = {};
        let currentPath = []; 
        let currentLang = 'fr';
        let translatedCache = {}; // 번역 속도 향상을 위한 캐시

        const langData = {
            fr: { subtitle: "La salle d'étude de Guéna et Jeongseop", toggleBtn: "🇰🇷 한국어", empty: "Aucune phrase.", human: "Humain", ai: "AI", play: "Écouter", close: "✕ Fermer" },
            ko: { subtitle: "게나엘과 정섭이 함께하는 공부방", toggleBtn: "🇫🇷 Français", empty: "문장이 없습니다.", human: "원어민", ai: "AI", play: "듣기", close: "✕ 닫기" }
        };

        window.onload = async () => {
            updateLanguageUI();
            try {
                const response = await fetch(FIREBASE_URL);
                const dbData = await response.json();
                if (dbData) {
                    globalData = dbData.data || [];
                    buildCategoryTree(dbData.categories || []);
                    renderCategoryLevels();
                }
            } catch (error) { console.error(error); }
        };

        // ★ 실시간 구글 번역 함수 (무료 API 우회)
        async function translateText(text, target) {
            if (!text || text.match(/^[a-zA-Z0-9\s]+$/)) return text; // 이미 영문이면 패스
            const cacheKey = `${text}_${target}`;
            if (translatedCache[cacheKey]) return translatedCache[cacheKey];

            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                const translated = data[0][0][0];
                translatedCache[cacheKey] = translated;
                return translated;
            } catch (e) {
                return text; // 에러 시 원문 반환
            }
        }

        async function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'ko' : 'fr';
            updateLanguageUI();
            await renderCategoryLevels(); // 카테고리 실시간 번역 렌더링
            if (currentPath.length > 0) renderSentences(currentPath.join('/'));
        }

        function updateLanguageUI() {
            document.getElementById("app-subtitle").innerText = langData[currentLang].subtitle;
            document.getElementById("lang-toggle-btn").innerText = langData[currentLang].toggleBtn;
            document.getElementById("btn-text-fr").innerText = langData[currentLang].play;
            document.getElementById("btn-text-ko").innerText = langData[currentLang].play;
            document.getElementById("btn-text-close").innerText = langData[currentLang].close;
        }

        function buildCategoryTree(categories) {
            catTree = {};
            categories.forEach(catPath => {
                let parts = catPath.split('/');
                let currentLevel = catTree;
                parts.forEach(part => {
                    if (!currentLevel[part]) currentLevel[part] = { _children: {} };
                    currentLevel = currentLevel[part]._children;
                });
            });
            document.getElementById("loader").style.display = "none";
        }

        async function renderCategoryLevels() {
            const container = document.getElementById("category-levels");
            container.innerHTML = "";
            let currentLevelNodes = catTree;
            let builtPath = [];

            await renderCategoryRow(currentLevelNodes, 0);

            for (let i = 0; i < currentPath.length; i++) {
                let selectedFolder = currentPath[i];
                if (currentLevelNodes[selectedFolder]) {
                    currentLevelNodes = currentLevelNodes[selectedFolder]._children;
                    if (Object.keys(currentLevelNodes).length > 0) {
                        await renderCategoryRow(currentLevelNodes, i + 1);
                    }
                }
            }
        }

        async function renderCategoryRow(nodes, depth) {
            const rowDiv = document.createElement("div");
            rowDiv.className = "category-row";
            
            // 병렬 번역 처리를 위해 프로미스 배열 생성
            const promises = Object.keys(nodes).map(async (folderName) => {
                const btn = document.createElement("button");
                btn.className = "cat-btn";
                
                // ★ 실시간 번역 적용 (한글일 때만 프랑스어로, 프랑스어일 때는 그대로)
                let displayName = folderName;
                if (currentLang === 'fr') {
                    displayName = await translateText(folderName, 'fr');
                } else {
                    displayName = await translateText(folderName, 'ko');
                }

                btn.innerText = displayName;
                if (currentPath[depth] === folderName) btn.classList.add("active");
                
                btn.onclick = async () => {
                    currentPath = currentPath.slice(0, depth);
                    currentPath.push(folderName);
                    await renderCategoryLevels();
                    renderSentences(currentPath.join('/'));
                };
                return btn;
            });

            const buttons = await Promise.all(promises);
            buttons.forEach(btn => rowDiv.appendChild(btn));
            document.getElementById("category-levels").appendChild(rowDiv);
        }

        function renderSentences(categoryPath) {
            const list = document.getElementById("sentence-list");
            list.innerHTML = "";
            const filteredData = globalData.filter(item => item.cat === categoryPath);
            if (filteredData.length === 0) {
                list.innerHTML = `<div class="empty-msg">${langData[currentLang].empty}</div>`;
                return;
            }
            filteredData.forEach((item) => {
                const isKo = /[가-힣]/.test(item.text);
                const koText = isKo ? item.text : item.trans;
                const frText = isKo ? item.trans : item.text;
                const card = document.createElement("div");
                card.className = "sentence-card";
                card.innerHTML = `
                    <div class="text-area">
                        <div class="fr-text">${frText}</div>
                        <div class="ko-text">${koText}</div>
                    </div>
                    <div class="badge-container">
                        ${(isKo?item.out_file:item.in_file) ? `<span class="badge badge-native">🇫🇷 ${langData[currentLang].human}</span>` : `<span class="badge badge-ai">🇫🇷 AI</span>`}
                        ${(isKo?item.in_file:item.out_file) ? `<span class="badge badge-native">🇰🇷 ${langData[currentLang].human}</span>` : `<span class="badge badge-ai">🇰🇷 AI</span>`}
                    </div>`;
                card.onclick = () => openModal(frText, koText, isKo?item.out_file:item.in_file, isKo?item.in_file:item.out_file);
                list.appendChild(card);
            });
        }

        function openModal(fr, ko, frF, koF) {
            currentItem = { frText: fr, koText: ko, frFile: frF, koFile: koF };
            document.getElementById("modal-text-fr").innerText = fr;
            document.getElementById("modal-text-ko").innerText = ko;
            document.getElementById("audio-modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("audio-modal").style.display = "none";
            if (window.currentAudio) window.currentAudio.pause();
            window.speechSynthesis.cancel();
        }

        function playAudio(lang) {
            if (window.currentAudio) window.currentAudio.pause();
            window.speechSynthesis.cancel();
            const text = lang === 'fr' ? currentItem.frText : currentItem.koText;
            const file = lang === 'fr' ? currentItem.frFile : currentItem.koFile;
            if (file) {
                const url = `https://firebasestorage.googleapis.com/v0/b/${STORAGE_BUCKET}/o/${encodeURIComponent(file)}?alt=media`;
                window.currentAudio = new Audio(url);
                window.currentAudio.play().catch(() => playTTS(text, lang === 'fr' ? 'fr-FR' : 'ko-KR'));
            } else {
                playTTS(text, lang === 'fr' ? 'fr-FR' : 'ko-KR');
            }
        }

        function playTTS(text, lang) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = lang; ut.rate = 0.9; window.speechSynthesis.speak(ut);
        }
    </script>
</body>
</html>
