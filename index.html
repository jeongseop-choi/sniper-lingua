<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper Lingua Mobile (Guena Special)</title>
    <style>
        /* 기본 폰트 및 배경 세팅 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f5f6fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* 팝업 뒷배경 (어둡게 처리) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        /* 하얀색 팝업창 본체 */
        .modal-content {
            background: white;
            width: 90%; max-width: 400px;
            border-radius: 20px;
            padding: 35px 20px 25px 20px;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 우측 상단 닫기 X 버튼 */
        .close-btn {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; font-size: 22px; color: #aaa;
            cursor: pointer; transition: color 0.2s;
        }
        .close-btn:active { color: #555; }

        /* 한국어 텍스트 (작은 회색) */
        .text-ko {
            color: #7f8c8d; font-size: 15px; line-height: 1.6; margin-bottom: 20px;
            word-break: keep-all; font-weight: 500;
        }

        /* 프랑스어 텍스트 (크고 굵은 남색) */
        .text-fr {
            color: #2c3e50; font-size: 24px; font-weight: 800; line-height: 1.4; margin-bottom: 35px;
            word-break: keep-all;
        }

        /* 버튼들 모아두는 곳 */
        .btn-group {
            display: flex; flex-direction: column; gap: 12px;
        }

        /* 버튼 공통 디자인 */
        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 17px; font-weight: 700; color: white; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: transform 0.1s ease-in-out;
        }
        .btn:active { transform: scale(0.97); } /* 누를 때 쫀득하게 눌리는 효과 */

        /* 프랑스어 버튼 색상 */
        .btn-fr { background-color: #4e54c8; }
        
        /* 한국어 버튼 색상 */
        .btn-ko { background-color: #e74c3c; }

        /* [AI] 동그란 뱃지 */
        .badge-ai {
            background: rgba(255,255,255,0.25); font-size: 11px;
            padding: 3px 7px; border-radius: 10px; margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="wordModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            
            <div class="text-ko" id="textKo">
                십일, 십이, 십삼, 십사, 십오, 십육, 십칠, 십팔, 십구, 이십
            </div>
            
            <div class="text-fr" id="textFr">
                onze, douze, treize, quatorze, quinze, seize, dix-sept, dix-huit, dix-neuf, vingt
            </div>
            
            <div class="btn-group">
                <button class="btn btn-fr" onclick="playAIVoice('fr')">
                    🇫🇷 프랑스어 <span class="badge-ai">AI</span>
                </button>
                
                <button class="btn btn-ko" onclick="playAIVoice('ko')">
                    🇰🇷 한국어 <span class="badge-ai">AI</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 전 세계 브라우저의 성우 목소리를 담아둘 빈 바구니
        let globalVoices = [];

        // 1. 성우 데이터 미리 싹 긁어오기 (아이폰 버그 방지 1단계)
        function loadVoices() {
            globalVoices = window.speechSynthesis.getVoices();
        }

        // 아이폰(사파리)이 성우 데이터를 뒤늦게 로딩할 때마다 바구니 새로고침
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        
        // 페이지 켜지자마자 1회 강제 실행
        loadVoices();

        // 2. 대망의 AI 음성 재생 함수 (버튼 누르면 발동!)
        function playAIVoice(langType) {
            // ★ 먹통 해결의 핵심: 말하기 전에 기존에 목구멍에 막힌 쓰레기 데이터 싹 날리기!
            window.speechSynthesis.cancel();

            // 텍스트랑 언어 설정 변수 준비
            let textToSpeak = "";
            let targetLangCode = "";

            // 누른 버튼에 따라 읽을 내용과 언어 코드를 세팅해 줌
            if (langType === 'fr') {
                textToSpeak = document.getElementById('textFr').innerText;
                targetLangCode = 'fr-FR'; // 프랑스어 규격
            } else {
                textToSpeak = document.getElementById('textKo').innerText;
                targetLangCode = 'ko-KR'; // 한국어 규격
            }

            // 사파리가 캔슬(취소)을 완벽히 소화할 수 있게 50ms(0.05초) 살짝 뜸을 들여줌
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                
                // 1차적으로 언어 규격 지정
                utterance.lang = targetLangCode;
                
                // ★ 외계인 콧소리 해결의 핵심 ★
                // 아이폰이 가져온 성우 바구니에서, 억지로 영어 발음하는 애들 치우고 '진짜 원어민'을 멱살 잡고 끌고 옴
                if (globalVoices.length > 0) {
                    const matchedVoice = globalVoices.find(voice => 
                        voice.lang.includes(targetLangCode) || voice.lang.includes(langType)
                    );
                    
                    if (matchedVoice) {
                        utterance.voice = matchedVoice; // 원어민 배정 완료!
                    }
                }
                
                // 말하기 속도랑 피치 (너무 빠르거나 로봇 같지 않게 정방향 1.0으로 고정)
                utterance.rate = 1.0; 
                utterance.pitch = 1.0;

                // 드디어 스피커로 발사!
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        // 창 닫기 버튼 누르면 실행되는 함수
        function closeModal() {
            document.getElementById('wordModal').style.display = 'none';
            // 창 닫을 때 AI가 떠들던 것도 매너 있게 멈추게 하는 센스!
            window.speechSynthesis.cancel(); 
        }
    </script>
</body>
</html>
